version: "3.9"

# Apollo-Agent: Bracket Edition
# docker-compose for local dev + Railway-compatible structure
#
# Usage:
#   docker-compose up --build
#   Frontend: http://localhost:3000
#   Backend:  http://localhost:8000
#   Postgres: localhost:5432

services:
  # ────────────────────────────────────────────────────────────────────
  # PostgreSQL — Double-entry ledger storage
  # ────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: apollo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: apollo
      POSTGRES_USER: apollo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-apollo_dev_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apollo -d apollo"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ────────────────────────────────────────────────────────────────────
  # FastAPI Backend
  # ────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: apollo-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://apollo:${POSTGRES_PASSWORD:-apollo_dev_secret}@postgres:5432/apollo
      LOG_LEVEL: INFO
      # Keys are NEVER in env vars — they come from the UI session API
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ────────────────────────────────────────────────────────────────────
  # Next.js Frontend
  # ────────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: apollo-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"

volumes:
  postgres_data:
    driver: local
